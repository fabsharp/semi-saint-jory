<footer class="site-footer">
  <div class="container footer-inner">
    <div class="footer-brand">
      <img src="{{ '/assets/images/logo.jpg' | relative_url }}" alt="Logo Semi-Marathon Saint-Jory" class="footer-logo">
      <p>{{ site.event.date }}</p>
      <p><a href="{{ site.event.maps_url }}" target="_blank" rel="noopener">{{ site.event.depart }}, {{ site.event.location }}</a></p>
    </div>
    <nav class="footer-nav" aria-label="Liens secondaires">
      <ul>
        {% for item in site.nav %}
        <li><a href="{{ item.url | relative_url }}">{{ item.title }}</a></li>
        {% endfor %}
      </ul>
    </nav>
    <div class="footer-links">
      <p><a href="{{ site.event.inscription_url }}" target="_blank" rel="noopener">S'inscrire</a></p>
      <p><a href="{{ '/mentions-legales/' | relative_url }}">Mentions légales</a></p>
      <p class="footer-copy">&copy; {{ 'now' | date: "%Y" }} {{ site.title }}</p>
    </div>
    <div class="footer-social">
      <p class="footer-social-label">Suivez-nous</p>
      <div class="footer-social-icons">
        {% if site.social.instagram %}
        <a href="{{ site.social.instagram }}" target="_blank" rel="noopener" aria-label="Instagram" class="social-icon">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24" aria-hidden="true">
            <path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.052.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98C8.333 23.986 8.741 24 12 24c3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 1 0 0 12.324 6.162 6.162 0 0 0 0-12.324zM12 16a4 4 0 1 1 0-8 4 4 0 0 1 0 8zm6.406-11.845a1.44 1.44 0 1 0 0 2.881 1.44 1.44 0 0 0 0-2.881z"/>
          </svg>
        </a>
        {% endif %}
      </div>
    </div>
  </div>
</footer>
