<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- 6 spokes (top, upper-right, lower-right, bottom, lower-left, upper-left) -->
  <line x1="50"   y1="43"   x2="50"   y2="8"    stroke="#e85e12" stroke-width="4.5" stroke-linecap="round"/>
  <line x1="56.1" y1="46.5" x2="86.4" y2="29"   stroke="#e85e12" stroke-width="4.5" stroke-linecap="round"/>
  <line x1="56.1" y1="53.5" x2="86.4" y2="71"   stroke="#e85e12" stroke-width="4.5" stroke-linecap="round"/>
  <line x1="50"   y1="57"   x2="50"   y2="92"   stroke="#e85e12" stroke-width="4.5" stroke-linecap="round"/>
  <line x1="43.9" y1="53.5" x2="13.6" y2="71"   stroke="#e85e12" stroke-width="4.5" stroke-linecap="round"/>
  <line x1="43.9" y1="46.5" x2="13.6" y2="29"   stroke="#e85e12" stroke-width="4.5" stroke-linecap="round"/>
  <!-- Outer rim -->
  <circle cx="50" cy="50" r="27" fill="none" stroke="#e85e12" stroke-width="4.5"/>
  <!-- Knobs at spoke ends -->
  <circle cx="50"   cy="8"  r="5.5" fill="#e85e12"/>
  <circle cx="86.4" cy="29" r="5.5" fill="#e85e12"/>
  <circle cx="86.4" cy="71" r="5.5" fill="#e85e12"/>
  <circle cx="50"   cy="92" r="5.5" fill="#e85e12"/>
  <circle cx="13.6" cy="71" r="5.5" fill="#e85e12"/>
  <circle cx="13.6" cy="29" r="5.5" fill="#e85e12"/>
  <!-- Center hub -->
  <circle cx="50" cy="50" r="8.5" fill="#e85e12"/>
  <circle cx="50" cy="50" r="3.5" fill="white"/>
</svg>
